<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Jason's Game Of Life (aka Land Grab Simulator)</title>
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<h1>Jason's Game Of Life <span class="subtitle">aka Land Grab Simulator</span></h1>
	<div class="main-layout">
		<div class="game-column">
			<div class="game-wrap">
				<canvas id="grid"></canvas>
				<div id="powerup-overlay"></div>
			</div>
			<div class="controls">
				<div class="speed-control">
					<label for="speed">Speed:</label>
					<input type="range" id="speed" min="0" max="4" value="2">
					<span id="speed-display">Normal</span>
				</div>
				<div class="button-row">
					<button id="settings">Settings</button>
					<button id="new-game">New Game</button>
					<button id="what">what?</button>
				</div>
			</div>
		</div>
		<aside class="side-panel">
			<div class="score-panel-title">Scores</div>
			<div id="score-list"></div>
			<div class="clock-panel-title">Time</div>
			<div id="clock-display" class="clock-display">30s</div>
		</aside>
	</div>

	<div id="settings-overlay" class="modal-overlay hidden">
		<div class="modal-panel">
			<div class="modal-title">Settings</div>
			<div class="modal-mode-row">
				<span class="modal-mode-label">Mode</span>
				<div class="mode-radio-group">
					<label class="mode-radio-item">
						<input type="radio" name="game-mode" value="0" checked>
						<span>boring</span>
					</label>
					<label class="mode-radio-item">
						<input type="radio" name="game-mode" value="1">
						<span>tournament</span>
					</label>
					<label class="mode-radio-item">
						<input type="radio" name="game-mode" value="2">
						<span>battle royale</span>
					</label>
				</div>
			</div>
			<div class="modal-columns">
				<div class="modal-section">
					<div class="modal-section-title">Bots</div>
					<div id="bot-list"></div>
				</div>
				<div class="modal-section modal-section-right">
					<div class="modal-section-title">Powerups</div>
					<div class="powerup-count-row">
						<span class="powerup-count-label">Count</span>
						<input type="range" id="powerup-count" min="1" max="10" value="3">
						<span id="powerup-count-display">3</span>
					</div>
					<div id="powerup-list"></div>
				</div>
			</div>
			<div class="modal-row-pair">
				<div class="modal-slider-half">
					<span class="modal-slider-label">Game Length</span>
					<input type="range" id="game-length" min="0" max="4" value="0" step="1">
					<span id="game-length-display">30s</span>
				</div>
				<div class="modal-slider-half modal-slider-half-right modal-slider-half-col">
					<span class="modal-slider-label">Board Size</span>
					<div class="mode-radio-group mode-radio-group-col">
						<label class="mode-radio-item">
							<input type="radio" name="board-size" value="0" checked>
							<span>large</span>
						</label>
						<label class="mode-radio-item">
							<input type="radio" name="board-size" value="1">
							<span>medium</span>
						</label>
						<label class="mode-radio-item">
							<input type="radio" name="board-size" value="2">
							<span>to the death!</span>
						</label>
					</div>
				</div>
			</div>
			<div class="modal-actions">
				<button class="modal-btn" id="modal-cancel">Cancel</button>
				<button class="modal-btn modal-btn-start" id="modal-ok">OK</button>
			</div>
		</div>
	</div>

	<div id="what-overlay" class="modal-overlay hidden">
		<div class="modal-panel modal-panel-narrow">
			<div class="modal-title">what is this?</div>
			<div class="what-body">
				<div id="aboutContent"></div>
			</div>
			<div class="modal-actions">
				<button class="modal-btn modal-btn-start" id="what-ok">ok, i guess?</button>
			</div>
		</div>
	</div>

	<div id="tournament-overlay" class="modal-overlay hidden">
		<div class="modal-panel modal-panel-narrow">
			<div class="modal-title" id="tournament-title"></div>
			<div id="tournament-champion" class="tournament-champion hidden"></div>
			<div id="tournament-round-result" class="tournament-round-result"></div>
			<div id="tournament-standings" class="tournament-standings"></div>
			<div class="modal-actions">
				<button class="modal-btn modal-btn-start" id="tournament-next-btn">next round</button>
			</div>
		</div>
	</div>

	<script src="js/bots/genghis.js"></script>
	<script src="js/bots/big-boy.js"></script>
	<script src="js/bots/hydra.js"></script>
	<script src="js/bots/lawnmower.js"></script>
	<script src="js/bots/airport-line.js"></script>
	<script src="js/bots/chaos.js"></script>
	<script src="js/bots/scout.js"></script>
	<script src="js/bots/bishop.js"></script>
	<script src="js/bots/drunk-jezzball.js"></script>
	<script src="js/game.js"></script>

	<script>		
		fetch('about.html')
			.then(response => response.text())
			.then(data => {
				document.querySelector('#aboutContent').outerHTML = data;
			}
		);

		const ranges = document.querySelectorAll('input[type="range"]');
		ranges.forEach(item => {
			item.addEventListener('click', (event) => {
				event.stopPropagation();
			});
		});
	</script>
</body>
</html>
